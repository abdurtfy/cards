<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Orders | carddesign.skin</title>
    <meta name="description" content="Admin order dashboard for carddesign.skin." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="carddesign.skin home">
        <span class="brand-mark"></span>
        <span>carddesign.skin</span>
      </a>
      <nav class="top-nav" aria-label="Primary navigation">
        <a href="./index.html">Products</a>
        <a href="./checkout.html">Checkout</a>
        <a href="./admin.html">Admin</a>
        <button class="nav-button" id="logoutButton" type="button">Logout</button>
      </nav>
    </header>

    <main class="admin-page">
      <section class="checkout-head" aria-labelledby="adminTitle">
        <p class="eyebrow">Admin</p>
        <h1 id="adminTitle">Orders</h1>
      </section>

      <section class="admin-toolbar">
        <div>
          <strong>Catalog</strong>
          <p class="muted">Set price and stock per product. Stock 0 marks it out of stock.</p>
        </div>
      </section>
      <section class="admin-catalog" id="catalogList" aria-live="polite">
        <p class="muted">Loading products...</p>
      </section>

      <section class="admin-toolbar">
        <div>
          <strong id="orderCount">0 orders</strong>
          <p class="muted">Addresses, payment status, and Shiprocket status.</p>
        </div>
        <button class="secondary-action" id="refreshOrders" type="button">Refresh</button>
      </section>

      <section class="orders-list" id="ordersList" aria-live="polite"></section>
    </main>

    <script src="./admin.js"></script>
  </body>
</html>
