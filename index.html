<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>carddesign.skin | Premium Card Skins</title>
    <meta name="description" content="Premium card skins for credit cards, debit cards, and metro cards." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="carddesign.skin home">
        <span class="brand-mark"></span>
        <span>carddesign.skin</span>
      </a>
      <nav class="top-nav" aria-label="Primary navigation">
        <a href="./index.html">Products</a>
        <a href="./checkout.html">Checkout</a>
      </nav>
      <button class="cart-button" id="cartButton" type="button" aria-label="Open cart">
        <span class="cart-icon" aria-hidden="true"></span>
        <span id="cartCount">0</span>
      </button>
    </header>

    <main class="catalog-page">
      <section class="catalog-head" aria-labelledby="catalogTitle">
        <div>
          <p class="eyebrow">Premium card skins</p>
          <h1 id="catalogTitle">Products</h1>
        </div>
      </section>

      <section class="product-grid" id="productGrid" aria-live="polite"></section>
    </main>

    <aside class="cart-drawer" id="cartDrawer" aria-hidden="true" aria-labelledby="cartTitle">
      <div class="cart-panel">
        <div class="cart-header">
          <h2 id="cartTitle">Cart</h2>
          <button class="icon-button" id="closeCartButton" type="button" aria-label="Close cart">x</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer">
          <div class="summary-row total">
            <span>Total</span>
            <strong id="drawerTotal">Rs 0</strong>
          </div>
          <a class="primary-action full" href="./checkout.html">Checkout</a>
        </div>
      </div>
    </aside>

    <script src="./store.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
